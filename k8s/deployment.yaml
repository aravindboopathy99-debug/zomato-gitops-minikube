apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zomato-app
  template:
    metadata:
      labels:
        app: zomato-app
    spec:
      containers:
        - name: zomato-app
          image: himasryellapu/zomato-app:latest
          ports:
            - containerPort: 3000
